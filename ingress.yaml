apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cv-ingress
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    # Кажемо Google Cloud створити класичний балансувальник
    kubernetes.io/ingress.class: "gce"
spec:
  defaultBackend:
    service:
      name: frontend # Весь невідомий трафік (тобто все) йде на фронтенд
      port:
        number: 80
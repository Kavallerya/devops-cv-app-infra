apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata: 
  name: cloudflare-token-sync
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token-secret
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: claudflare-api-token